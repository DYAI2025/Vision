      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --frozen ruff check .

      - name: Type check (mypy strict)
        run: uv run --frozen mypy app

      - name: Run tests (pytest)
        run: uv run --frozen pytest -q

  # All six per-component test jobs are now present
  # (whatsorga-ingest-test, hermes-runtime-test, backlog-core-test,
  # gbrain-bridge-test, kanban-sync-test, cli-test). Future per-component
  # work modifies these in place rather than adding new jobs.
