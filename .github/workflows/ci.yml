      - uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.16"
          enable-cache: true
          cache-dependency-glob: "3-code/gbrain-bridge/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --frozen ruff check .

      - name: Type check (mypy strict)
        run: uv run --frozen mypy app

      - name: Run tests (pytest)
        run: uv run --frozen pytest -q

  kanban-sync-test:
    name: kanban-sync tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    defaults:
      run:
        working-directory: 3-code/kanban-sync
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.16"
          enable-cache: true
