name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands. Saves runner
# minutes on rapid PR force-pushes and avoids stale-build comments on PRs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure-check:
    name: Repository structure check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify expected top-level directories exist
        run: |
          set -e
          for dir in 1-spec 2-design 3-code 4-deploy decisions .github; do
            if [ ! -d "$dir" ]; then
              echo "Missing required directory: $dir"
              exit 1
            fi
          done

      - name: Verify expected component directories exist
        run: |
          set -e
          for component in whatsorga-ingest hermes-runtime backlog-core gbrain-bridge kanban-sync cli; do
            if [ ! -d "3-code/$component" ]; then
              echo "Missing required component directory: 3-code/$component"
              exit 1
            fi
            if [ ! -f "3-code/$component/CLAUDE.component.md" ]; then
              echo "Missing CLAUDE.component.md for: 3-code/$component"
              exit 1
            fi
          done

      - name: Verify root project files exist
        run: |
          set -e
          for file in CLAUDE.md README.md 3-code/tasks.md 3-code/CLAUDE.code.md \
                     2-design/architecture.md 2-design/data-model.md 2-design/api-design.md \
                     1-spec/CLAUDE.spec.md 1-spec/stakeholders.md \
                     decisions/PROCEDURES.md; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

  compose-validate:
    name: docker-compose syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    steps:
      - uses: actions/checkout@v4

      - name: Provide minimal env vars for substitution
        run: |
          # Compose substitutes ${VAR:?...} keys at parse time even with --quiet.
          # These dummy values let `compose config` succeed without real secrets.
          # Keep this list synchronized with the required keys in .env.example;
          # `env-drift-check` job below catches drift between .env.example and compose.
          {
            echo "POSTGRES_PASSWORD=ci-validation-password"
            echo "TS_AUTHKEY=tskey-ci-validation"
            echo "WHATSORGA_INGEST_TOKEN=ci-token"
            echo "HERMES_RUNTIME_TOKEN=ci-token"
            echo "BACKLOG_CORE_TOKEN=ci-token"
            echo "GBRAIN_BRIDGE_TOKEN=ci-token"
            echo "KANBAN_SYNC_TOKEN=ci-token"
            echo "OPERATOR_TOKEN=ci-token"
          } > .env

      - name: Validate Compose configuration (caddy profile)
        run: docker compose --profile caddy config --quiet

      - name: Validate Compose configuration (tailscale profile)
        run: docker compose --profile tailscale config --quiet

      - name: Validate Compose configuration (cli profile)
        run: docker compose --profile cli config --quiet

      - name: Clean up CI .env
        if: always()
        run: rm -f .env

  env-drift-check:
    name: .env.example drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    steps:
      - uses: actions/checkout@v4

      - name: Run drift check
        run: bash scripts/check-env-drift.sh

  caddyfile-validate:
    name: Caddyfile syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    steps:
      - uses: actions/checkout@v4

      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -v "$PWD/4-deploy/ingress/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  scripts-lint:
    name: Shell scripts lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    steps:
      - uses: actions/checkout@v4

      - name: bash -n syntax check
        run: |
          set -e
          for s in scripts/*.sh; do
            bash -n "$s"
            echo "OK: $s"
          done

      - name: shellcheck
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: |
          set -e
          shellcheck --version
          for s in scripts/*.sh; do
            echo "--- $s ---"
            shellcheck "$s"
          done

  whatsorga-ingest-test:
    name: whatsorga-ingest tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    defaults:
      run:
        working-directory: 3-code/whatsorga-ingest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.16"
          enable-cache: true
          cache-dependency-glob: "3-code/whatsorga-ingest/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --frozen ruff check .

      - name: Type check (mypy strict)
        run: uv run --frozen mypy app

      - name: Run tests (pytest)
        run: uv run --frozen pytest -q

  hermes-runtime-test:
    name: hermes-runtime tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    defaults:
      run:
        working-directory: 3-code/hermes-runtime
    steps:
