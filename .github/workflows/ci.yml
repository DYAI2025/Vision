    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: structure-check
    defaults:
      run:
        working-directory: 3-code/cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.16"
          enable-cache: true
