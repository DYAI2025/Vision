      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.16"
          enable-cache: true
          cache-dependency-glob: "3-code/hermes-runtime/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --frozen ruff check .

      - name: Type check (mypy strict)
