# Top-level Compose stack for project-agent-system.
#
# Architecture: 5 components + Postgres + Ollama + ingress (Caddy or Tailscale via profile).
# See 2-design/architecture.md for the full system architecture and
# 3-code/CLAUDE.code.md for component pointers.
#
# Per-component Dockerfiles, application code, and detailed env requirements
# are added by the corresponding skeleton tasks
# (TASK-whatsorga-skeleton, TASK-hermes-skeleton, TASK-backlog-core-skeleton,
# TASK-gbrain-bridge-skeleton, TASK-kanban-sync-skeleton). Until those tasks
# complete, the per-component services declared here cannot be built.
# Postgres and Ollama (image-based) can run independently.
#
# Inter-service communication: synchronous HTTP/REST on the internal bridge
# network per DEC-direct-http-between-services. Services discover each other
# by service name (e.g. http://backlog-core:8000).
#
# Ingress: Caddy is the default public-facing reverse proxy; Tailscale is an
# alternative profile for private-network-only deployments. Selection is via
# COMPOSE_PROFILES in .env (per REQ-MNT-env-driven-config). Ingress
# configurations are added by TASK-ingress-caddy-config and
# TASK-ingress-tailscale-config.

name: project-agent-system

# Shared logging anchor — applied to every service via *default-logging.
# Limits per-service log size to ~30 MB max (10 MB × 3 rotations) so a
# long-running VPS doesn't fill its disk with container logs. Per
# REQ-REL-backup-restore-fidelity (host-independence: no surprise
# full-disk states on restored hosts).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:

  # =====================================================================
  # Storage layers
  # =====================================================================

  postgres:
    # Per DEC-postgres-as-event-store: Postgres 16+ as the event store for
    # backlog-core. Internal-only; no host port mapping. Backups via pg_dump
    # are operator-side (TASK-backup-script).
    image: postgres:16-alpine
    container_name: project-agent-system-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision}
      POSTGRES_USER: ${POSTGRES_USER:-vision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts mount (read-only). Files in 4-deploy/postgres/init/ run
      # alphabetically on first container start only — see that directory's
      # README and 4-deploy/postgres/README.md.
      - ./4-deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision} -d ${POSTGRES_DB:-vision}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  ollama:
    # Local model runtime per CON-local-first-inference. Initial model pull
    # is operator-side (TASK-ollama-bootstrap). Internal-only.
    image: ollama/ollama:latest
    container_name: project-agent-system-ollama
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # =====================================================================
  # Components
  # =====================================================================
  # Each component has its own per-component CLAUDE.component.md
  # (3-code/<component>/CLAUDE.component.md) describing its responsibilities,
  # interfaces, and applicable decisions. Per-component Dockerfiles are
  # added by the corresponding skeleton tasks.

  backlog-core:
    # The event-sourced technical truth layer.
    # See 3-code/backlog-core/CLAUDE.component.md.
    # Build context is the repo root per DEC-shared-utility-path-deps so that
    # the Dockerfile can copy both 3-code/backlog-core/ and 3-code/_common/.
    build:
      context: .
      dockerfile: 3-code/backlog-core/Dockerfile
    container_name: project-agent-system-backlog-core
    restart: unless-stopped
    logging: *default-logging
    # No env_file: -- per H-1 from the 2026-04-28 code review, secrets are
    # scoped per service. backlog-core's accepted-tokens list contains every
    # caller identity that may invoke its endpoints (per
    # DEC-service-auth-bearer-tokens).
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vision}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vision}
      # Connection-pool sizing — overridable for production load tuning.
      BACKLOG_CORE_DB_POOL_MIN: ${BACKLOG_CORE_DB_POOL_MIN:-1}
      BACKLOG_CORE_DB_POOL_MAX: ${BACKLOG_CORE_DB_POOL_MAX:-10}
      # Outbound — backlog-core's identity for cascade calls to gbrain-bridge / kanban-sync.
      BACKLOG_CORE_TOKEN: ${BACKLOG_CORE_TOKEN:?required}
      # Inbound — accepted from each caller per DEC-service-auth-bearer-tokens.
      WHATSORGA_INGEST_TOKEN: ${WHATSORGA_INGEST_TOKEN:?required}
      HERMES_RUNTIME_TOKEN: ${HERMES_RUNTIME_TOKEN:?required}
      GBRAIN_BRIDGE_TOKEN: ${GBRAIN_BRIDGE_TOKEN:?required}
      KANBAN_SYNC_TOKEN: ${KANBAN_SYNC_TOKEN:?required}
      OPERATOR_TOKEN: ${OPERATOR_TOKEN:?required}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  whatsorga-ingest:
    # Channel adapters + normalization + consent check at the boundary.
    # See 3-code/whatsorga-ingest/CLAUDE.component.md.
    # Build context is the repo root per DEC-shared-utility-path-deps so that
    # the Dockerfile can copy both 3-code/whatsorga-ingest/ and 3-code/_common/.
    build:
      context: .
      dockerfile: 3-code/whatsorga-ingest/Dockerfile
    container_name: project-agent-system-whatsorga-ingest
    restart: unless-stopped
    logging: *default-logging
    # No env_file: -- secrets scoped per service per H-1 / DEC-service-auth-bearer-tokens.
    environment:
      BACKLOG_CORE_URL: http://backlog-core:8000
      # Outbound — whatsorga-ingest's identity for POST /v1/inputs to backlog-core.
      WHATSORGA_INGEST_TOKEN: ${WHATSORGA_INGEST_TOKEN:?required}
      # Inbound — accepted from operator CLI for source-registration adapter wiring.
      OPERATOR_TOKEN: ${OPERATOR_TOKEN:?required}
    depends_on:
      backlog-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  hermes-runtime:
    # Agent runtime + skills + confidence-gate middleware + learning loop.
    # See 3-code/hermes-runtime/CLAUDE.component.md.
    # Build context is the repo root per DEC-shared-utility-path-deps so that
    # the Dockerfile can copy both 3-code/hermes-runtime/ and 3-code/_common/.
    build:
      context: .
      dockerfile: 3-code/hermes-runtime/Dockerfile
    container_name: project-agent-system-hermes-runtime
    restart: unless-stopped
    logging: *default-logging
    # No env_file: -- secrets scoped per service per H-1 / DEC-service-auth-bearer-tokens.
    environment:
      BACKLOG_CORE_URL: http://backlog-core:8000
      GBRAIN_BRIDGE_URL: http://gbrain-bridge:8000
      KANBAN_SYNC_URL: http://kanban-sync:8000
      OLLAMA_URL: http://ollama:11434
      # Default Gemma-family model. Overridable per-deployment in .env.
      # See 4-deploy/ollama/README.md for the model footprint table.
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      # Outbound — hermes-runtime's identity for proposal-pipeline calls and reads
      # against backlog-core / gbrain-bridge / kanban-sync.
      HERMES_RUNTIME_TOKEN: ${HERMES_RUNTIME_TOKEN:?required}
      # Inbound — accepted from operator CLI for POST /v1/agent/process-now.
      OPERATOR_TOKEN: ${OPERATOR_TOKEN:?required}
    depends_on:
      backlog-core:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  gbrain-bridge:
    # GBrain vault read/write + schema validation + redaction precondition
    # + Obsidian command-palette watch script.
    # See 3-code/gbrain-bridge/CLAUDE.component.md.
    # Build context is the repo root per DEC-shared-utility-path-deps so that
    # the Dockerfile can copy both 3-code/gbrain-bridge/ and 3-code/_common/.
    build:
      context: .
      dockerfile: 3-code/gbrain-bridge/Dockerfile
    container_name: project-agent-system-gbrain-bridge
    restart: unless-stopped
    logging: *default-logging
    # No env_file: -- secrets scoped per service per H-1 / DEC-service-auth-bearer-tokens.
    environment:
      BACKLOG_CORE_URL: http://backlog-core:8000
      VAULT_PATH: ${VAULT_PATH:-/vault}
      # Outbound — gbrain-bridge's identity for disposition POSTs from the
      # Obsidian command-palette watch script (per DEC-obsidian-as-review-ui).
      GBRAIN_BRIDGE_TOKEN: ${GBRAIN_BRIDGE_TOKEN:?required}
      # Inbound — accepted from hermes-runtime (page CRUD), backlog-core (RTBF cascade).
      HERMES_RUNTIME_TOKEN: ${HERMES_RUNTIME_TOKEN:?required}
      BACKLOG_CORE_TOKEN: ${BACKLOG_CORE_TOKEN:?required}
    volumes:
      - vault:/vault
    depends_on:
      backlog-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  kanban-sync:
    # Obsidian Kanban file I/O + sync-vs-edit boundary detection.
    # See 3-code/kanban-sync/CLAUDE.component.md.
    # Build context is the repo root per DEC-shared-utility-path-deps so that
    # the Dockerfile can copy both 3-code/kanban-sync/ and 3-code/_common/.
    build:
      context: .
      dockerfile: 3-code/kanban-sync/Dockerfile
    container_name: project-agent-system-kanban-sync
    restart: unless-stopped
    logging: *default-logging
    # No env_file: -- secrets scoped per service per H-1 / DEC-service-auth-bearer-tokens.
    environment:
      BACKLOG_CORE_URL: http://backlog-core:8000
      VAULT_PATH: ${VAULT_PATH:-/vault}
      KANBAN_SUBTREE: /vault/Kanban
      # Outbound — kanban-sync's identity for kanban.user_edit / unattributed_edit
      # events to backlog-core.
      KANBAN_SYNC_TOKEN: ${KANBAN_SYNC_TOKEN:?required}
      # Inbound — accepted from hermes-runtime (card CRUD), backlog-core
      # (RTBF cascade, scheduled sync trigger).
      HERMES_RUNTIME_TOKEN: ${HERMES_RUNTIME_TOKEN:?required}
      BACKLOG_CORE_TOKEN: ${BACKLOG_CORE_TOKEN:?required}
    volumes:
      - vault:/vault
    depends_on:
      backlog-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # =====================================================================
  # Ingress profiles
  # =====================================================================
  # Set COMPOSE_PROFILES in .env to caddy (default, public hostname) or
  # tailscale (private-network-only). Per REQ-MNT-env-driven-config.

  ingress-caddy:
    # Public-facing reverse proxy. Routes per 4-deploy/ingress/Caddyfile,
    # which is path-based and forwards to internal services (port 8000).
    # See 4-deploy/ingress/README.md for the operator-facing reference.
    image: caddy:2-alpine
    container_name: project-agent-system-ingress-caddy
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      # Hostname Caddy serves on; "localhost" uses the internal CA (self-signed),
      # any other hostname triggers Let's Encrypt auto-TLS.
      CADDY_HOSTNAME: ${CADDY_HOSTNAME:-localhost}
      # Email registered with Let's Encrypt — required for non-localhost hosts.
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-operator@example.com}
      # Browser origin allowed to call API routes from the Railway frontend.
      FRONTEND_ALLOWED_ORIGIN: ${FRONTEND_ALLOWED_ORIGIN:-http://localhost:5173}
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      # Caddyfile mount (read-only) — operator-edit lands in the repo, not
      # in the container.
      - ./4-deploy/ingress/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      backlog-core:
        condition: service_healthy
      hermes-runtime:
        condition: service_healthy
    networks:
      - internal

  ingress-tailscale:
    # Private-network-only ingress. Joins the Tailnet via TS_AUTHKEY and
    # applies the path-based reverse-proxy routes declared in
    # 4-deploy/ingress/tailscale-serve.json (mirroring the Caddy matrix
    # per 2-design/api-design.md). Reachable only from the operator's
    # Tailnet — no Funnel exposure (REQ-PORT-vps-deploy private-network-only).
    # See 4-deploy/ingress/README.md for the operator-facing reference.
    image: tailscale/tailscale:latest
    container_name: project-agent-system-ingress-tailscale
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - tailscale
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY is required when using the tailscale profile}
      TS_HOSTNAME: ${TS_HOSTNAME:-vision}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # Declarative `tailscale serve` config — applied automatically by
      # containerboot on start (Tailscale image >= 1.55). Tailscale resolves
      # the cert-domain placeholder inside the JSON at runtime to the node's
      # MagicDNS hostname; see 4-deploy/ingress/tailscale-serve.json.
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      # Serve config mount (read-only) — operator-edit lands in the repo,
      # not in the container.
      - ./4-deploy/ingress/tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      backlog-core:
        condition: service_healthy
      hermes-runtime:
        condition: service_healthy
    networks:
      - internal

  # =====================================================================
  # Operator CLI — secondary distribution mode per DEC-cli-stack-python-typer
  # =====================================================================
  # Profile-gated: only built/started when the operator opts in with
  #   `docker compose --profile cli run --rm cli <subcommand>`.
  # Primary distribution is `uv tool install` on the operator's host; this
  # in-stack mode exists for debugging without polluting the host toolchain.
  # Default ENTRYPOINT is `vision`, so the command after `cli` is the
  # subcommand. VISION_BASE_URL targets the in-Compose Caddy ingress.

  cli:
    build:
      context: ./3-code/cli
    container_name: project-agent-system-cli
    profiles:
      - cli
    environment:
      VISION_BASE_URL: http://ingress-caddy
      # Operator token forwarded so future auth-required commands work.
      OPERATOR_TOKEN: ${OPERATOR_TOKEN:?required}
    networks:
      - internal

# =====================================================================
# Volumes — all named so they survive `docker compose down` and can be
# included in backups (TASK-backup-script). Per REQ-REL-backup-restore-fidelity.
# =====================================================================

volumes:
  postgres-data:
    name: project-agent-system_postgres-data
  ollama-models:
    name: project-agent-system_ollama-models
  vault:
    name: project-agent-system_vault
  caddy-data:
    name: project-agent-system_caddy-data
  caddy-config:
    name: project-agent-system_caddy-config
  tailscale-state:
    name: project-agent-system_tailscale-state

# =====================================================================
# Networks — single internal bridge network per DEC-direct-http-between-services.
# Services discover each other by service name. No host port mappings on
# components — external access goes through the chosen ingress profile.
# =====================================================================

networks:
  internal:
    name: project-agent-system_internal
    driver: bridge
